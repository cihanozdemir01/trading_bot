name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏷️ Inject Release Version into App Code
        run: |
          TAG_VER="${{ github.ref_name }}"
          CLEAN_VER="${TAG_VER#v}"
          echo "Injecting version: $CLEAN_VER"
          sed -i "s/CURRENT_APP_VERSION = \".*\"/CURRENT_APP_VERSION = \"$CLEAN_VER\"/g" mobile/services/UpdateService.js
          sed -i "s/\"version\": \".*\"/\"version\": \"$CLEAN_VER\"/g" mobile/app.json

      - name: 📦 Install Mobile Dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps

      - name: 🛠️ Expo Prebuild (Generate Native Android Project)
        run: |
          cd mobile
          npx expo prebuild --platform android --clean --no-install

      - name: 📦 Export Offline JS Bundle
        run: |
          cd mobile
          npx expo export --platform android

      - name: 🔨 Build Standalone Android APK with Gradle
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace || ./gradlew assembleDebug --no-daemon -Pproject.ext.react="[bundleInDebug: true]"

      - name: 🚀 Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Otomatik oluşturulmuş tam bağımsız (standalone) sürüm: ${{ github.ref_name }}"
          files: |
            mobile/android/app/build/outputs/apk/release/*.apk
            mobile/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
